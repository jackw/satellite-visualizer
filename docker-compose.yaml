version: '3.0'

services:
  grafana:
    container_name: 'satellite-visualizer-panel'
    platform: 'linux/amd64'
    build:
      args:
        grafana_version: ${GRAFANA_VERSION:-11.6.11}
    volumes:
      - ./dist:/var/lib/grafana/plugins/satellite-visualizer-panel
      - ./config:/etc/grafana
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana

volumes:
  grafana-storage:
